[project]
name = "owl"
version = "0.20.0"
description = "Package and project manager for the Mire (Avenys) language"
entry = "code/main.mire"

[build]
compiler = "mire"
profile = "debug"
opt-level = "0"

[paths]
sources = "code"
tests = "tests"
output = "bin"
cache = "bin/.cache"

[dependencies]
kioto = { path = "../kioto" }
testlib = { path = "./tests/lib" }
util = { path = "./code/util" }
crypto = { path = "./code/crypto" }
trust = { path = "./code/trust" }
registry = { path = "./code/registry" }
build = { path = "./code/build" }
check = { path = "./code/check" }
info = { path = "./code/info" }
ui = { path = "./code/ui" }
deps = { path = "./code/deps" }
args = { path = "./code/args" }
lockfile = { path = "./code/lockfile" }
import = { path = "./code/import" }
install = { path = "./code/install" }
semver = { path = "./code/semver" }
